# /etc/nginx/sites-available/hrlsync-api
# ── HTTP redirect ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.hardbanrecords.com;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.hardbanrecords.com;

    # SSL (filled by certbot)
    ssl_certificate     /etc/letsencrypt/live/api.hardbanrecords.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hardbanrecords.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff"         always;
    # Allow embedding for the player
    add_header X-Frame-Options           "ALLOWALL"        always;

    # Large files (audio streaming)
    client_max_body_size 0;
    client_body_timeout  300s;

    # Proxy to Node.js
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Needed for audio streaming
        proxy_buffering    off;
    }

    # Cache static/embed assets
    location ~* \.(js|css|woff2|png|svg)$ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=3600";
    }
}
